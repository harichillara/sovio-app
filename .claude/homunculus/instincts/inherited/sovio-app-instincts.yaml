# Sovio App Workflow Database Table Addition And Rls Hardening

## Action

Follow the database-table-addition-and-rls-hardening workflow:
1. Create SQL migration(s) in supabase/migrations/ for new table and/or RLS policies.
2. Add/modify RLS policies with canonical naming and deny-by-default posture.
3. Seed table with initial data if needed.
4. Update supabase/config.toml or related config if new triggers/functions are needed.
5. Update generated types (e.g., database.types.ts) if client access is required.
6. Add or update integration tests in supabase/tests/ or tests/integration/ to verify RLS boundaries.
7. If client access is needed, add service and hook in packages/core/src/services/ and packages/core/src/hooks/.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: supabase/migrations/*.sql, supabase/config.toml, supabase/tests/*.test.ts

